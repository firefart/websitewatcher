services:
  websitewatcher:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${REGISTRY_MIRROR_URL:-}firefart/websitewatcher:latest
    restart: unless-stopped
    command: ["-config", "/app/config.json"]
    configs:
      - source: app
        target: /app/config.json
    volumes:
      - data:/app/data

configs:
  app:
    file: ./config.json

volumes:
  data:
